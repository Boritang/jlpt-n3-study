<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">

<title>JLPT N3 한자 연상 암기장</title>
<style>
:root{--bg:#f6f4ee;--ink:#1f2933;--muted:#66717f;--line:#ded7c9;--card:#fffdf7;--red:#b8322a;--green:#176b5b;--blue:#28587b;--gold:#a76716;--teal:#0f766e;--shadow:0 10px 28px rgba(31,41,51,.10)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{touch-action:manipulation}.app{max-width:780px;margin:0 auto;padding:12px 12px 94px}.top{position:sticky;top:0;z-index:4;margin:0 -12px 10px;padding:10px 12px;background:rgba(246,244,238,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.title{display:flex;align-items:end;justify-content:space-between;gap:10px}h1{margin:0;font-size:21px;line-height:1.1}.title span{font-size:12px;color:var(--muted)}.meter{height:8px;background:#e8e1d4;border-radius:999px;overflow:hidden;margin-top:10px}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold))}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px}.stat b{display:block;font-size:17px}.stat small{color:var(--muted);font-size:11px}.search{display:flex;gap:8px;margin-top:10px}input,select{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px 11px;color:var(--ink)}.tabs,.tools{display:flex;gap:7px;overflow:auto;padding:2px 0;margin-top:9px}.tab,.tool{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;white-space:nowrap;color:var(--ink)}.tab.on,.tool.primary{background:var(--ink);color:#fff;border-color:var(--ink)}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:15px;margin:10px 0}.meta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;gap:10px}.jp{font-family:"Noto Sans JP",sans-serif;font-size:42px;line-height:1.14;margin:9px 0 4px;word-break:keep-all}.read{font-size:20px;color:var(--blue);margin-bottom:10px}.mean{font-size:18px;line-height:1.45}.focus{margin-top:12px;background:#f0f7f5;border:1px solid #c9e2dc;border-radius:8px;padding:11px;font-size:17px;line-height:1.45}.memory{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}.memory summary{cursor:pointer;color:var(--teal);font-weight:700;margin-bottom:8px}.kanji{margin-top:9px;padding:11px;border:1px solid var(--line);border-radius:8px;background:#fff}.kanji-head{display:flex;align-items:center;gap:10px;margin-bottom:7px}.kanji-char{font-family:"Noto Sans JP",sans-serif;font-size:33px;line-height:1}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{border:1px solid #d7c7a7;background:#fff8e6;color:#6f470e;border-radius:999px;padding:4px 8px;font-size:13px}.kanji p{margin:7px 0 0;color:#334155;line-height:1.45}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:13px}.actions button{border:1px solid var(--line);border-radius:8px;background:#fff;padding:11px 8px}.actions .known{border-color:#bdd7ce;color:var(--green)}.actions .again{border-color:#eccaca;color:var(--red)}.actions .iffy{border-color:#e4ce9c;color:#8a5a0a}.hidden .read,.hidden .mean{filter:blur(8px);user-select:none}.empty{text-align:center;color:var(--muted);padding:42px 12px}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,247,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottom button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px 12px;min-width:70px}.bottom .primary{background:var(--ink);color:#fff}.panel{display:none}.panel.on{display:block}.choice{width:100%;text-align:left;margin:8px 0;border:1px solid var(--line);background:#fff;border-radius:8px;padding:13px}.choice.good{border-color:var(--green);background:#e9f5f1}.choice.bad{border-color:var(--red);background:#faeceb}.badge{color:#fff;background:var(--gold);border-radius:999px;padding:3px 8px;font-size:12px}.mini{font-size:12px;color:var(--muted);margin-top:8px}.sessionList{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px}.row .k{font-family:"Noto Sans JP";font-size:23px}@media(max-width:520px){.actions{grid-template-columns:repeat(2,1fr)}}@media(max-width:430px){.jp{font-size:36px}.stats{grid-template-columns:repeat(2,1fr)}.actions{grid-template-columns:1fr}.search{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title"><h1>JLPT N3 한자 연상</h1><span>빠른 회독 모드</span></div>
    <div class="meter"><i id="bar"></i></div>
    <div class="stats"><div class="stat"><b id="seen">0</b><small>외움</small></div><div class="stat"><b id="weak">0</b><small>약점</small></div><div class="stat"><b id="starred">0</b><small>북마크</small></div><div class="stat"><b id="left">500</b><small>남음</small></div></div>
    <div class="search"><input id="q" placeholder="검색: 한자, 읽기, 뜻, 연상"><select id="sort"><option value="smart">스마트순</option><option value="no">번호순</option><option value="random">랜덤</option><option value="hard">약점 먼저</option></select></div>
    <div class="tabs" id="tabs"></div>
    <div class="tools"><button class="tool primary" id="modeCards">카드</button><button class="tool" id="modeQuiz">퀴즈</button><button class="tool" id="modeCram">20개 집중</button><button class="tool" id="onlyWeak">약점만</button><button class="tool" id="onlyStar">북마크만</button><button class="tool" id="hideMean">뜻 가리기</button></div>
  </div>
  <main id="cards" class="panel on"></main>
  <main id="quiz" class="panel"></main>
  <main id="cram" class="panel"></main>
</div>
<div class="bottom"><button id="prev">이전</button><button id="shuffle" class="primary">랜덤</button><button id="next">다음</button></div>
<script>
const DATA=[{"no":1,"word":"飽きる","reading":"あきる","meaning":"질리다, 싫증나다","pos":"동사","kanjiNotes":[{"char":"飽","parts":[{"glyph":"食","label":"먹다","scene":"음식을 먹는 모습"},{"glyph":"包","label":"감싸다","scene":"안에 싸서 넣는 모습"}],"line":"먹을 것을 싸둘 만큼 차면 더 먹기 싫어집니다."}],"story":"먹다 + 감싸다 장면을 한 컷으로 그린 뒤, 마지막에 '질리다'라는 자막을 붙이세요."},{"no":2,"word":"預ける","reading":"あずける","meaning":"맡기다","pos":"동사","kanjiNotes":[{"char":"預","parts":[{"glyph":"予","label":"予","scene":"予 모양을 단서로 삼기"},{"glyph":"頁","label":"머리","scene":"머리나 얼굴 쪽"}],"line":"머리로 먼저 맡겨 둔다고 떠올리세요."}],"story":"予 + 머리 장면을 한 컷으로 그린 뒤, 마지막에 '맡기다'라는 자막을 붙이세요."},{"no":3,"word":"当たる","reading":"あたる","meaning":"맞다, 적중하다","pos":"동사","kanjiNotes":[{"char":"当","parts":[{"glyph":"⺌","label":"작은 빛","scene":"작게 흩어지는 빛"},{"glyph":"彐","label":"손","scene":"가로로 누운 손"}],"line":"정면으로 딱 맞아 떨어지는 모습입니다."}],"story":"작은 빛 + 손 장면을 한 컷으로 그린 뒤, 마지막에 '맞다'라는 자막을 붙이세요."},{"no":4,"word":"余る","reading":"あまる","meaning":"남다","pos":"동사","kanjiNotes":[{"char":"余","parts":[{"glyph":"人","label":"사람","scene":"사람이 서 있는 모습"},{"glyph":"木","label":"나무","scene":"나무가 서 있거나 자라는 모습"}],"line":"남아서 위에 얹혀 있는 여분입니다."}],"story":"사람 + 나무 장면을 한 컷으로 그린 뒤, 마지막에 '남다'라는 자막을 붙이세요."},{"no":5,"word":"編む","reading":"あむ","meaning":"(스웨터를) 짜다","pos":"동사","kanjiNotes":[{"char":"編","parts":[{"glyph":"糸","label":"실","scene":"이어지고 묶이는 실"},{"glyph":"扁","label":"납작함","scene":"옆으로 납작한 모양"}],"line":"실을 납작하게 엮어 짜는 장면입니다."}],"story":"실 + 납작함 장면을 한 컷으로 그린 뒤, 마지막에 '(스웨터를) 짜다'라는 자막을 붙이세요."},{"no":6,"word":"表す","reading":"あらわす","meaning":"나타내다, 표현하다","pos":"동사","kanjiNotes":[{"char":"表","parts":[{"glyph":"衣","label":"옷","scene":"옷을 입거나 덮는 모습"}],"line":"겉으로 드러난 옷의 앞면입니다."}],"story":"옷 장면을 한 컷으로 그린 뒤, 마지막에 '나타내다'라는 자막을 붙이세요."},{"no":7,"word":"慌てる","reading":"あわてる","meaning":"허둥대다","pos":"동사","kanjiNotes":[{"char":"慌","parts":[{"glyph":"忄","label":"마음","scene":"마음이 흔들리는 모습"},{"glyph":"艹","label":"풀","scene":"풀이나 식물이 자라는 모습"}],"line":"마음이 거칠게 흔들려 허둥대는 장면입니다."}],"story":"마음 + 풀 장면을 한 컷으로 그린 뒤, 마지막에 '허둥대다'라는 자막을 붙이세 const storeKey='n3-500-efficient-progress-v2';
let progress=JSON.parse(localStorage.getItem(storeKey)||'{"known":{},"star":{},"miss":{},"seen":{}}');
let state={pos:'전체',q:'',sort:'smart',star:false,weak:false,hidden:false,mode:'cards',index:0,session:[],lastSeenNo:null};
const posList=['전체',...Array.from(new Set(DATA.map(x=>x.pos)))];
const $=id=>document.getElementById(id);
const byNo=no=>DATA[no-1];
function save(){localStorage.setItem(storeKey,JSON.stringify(progress));stats()}
function miss(no){return progress.miss[no]||0}
function isWeak(x){return miss(x.no)>0||!progress.known[x.no]}
function score(x){return (progress.known[x.no]?30:0)-(miss(x.no)*12)-(progress.star[x.no]?6:0)+(progress.seen[x.no]||0)*0.3+x.no*0.001}
function stats(){let k=Object.keys(progress.known).length,s=Object.keys(progress.star).length,w=DATA.filter(isWeak).length;$('seen').textContent=k;$('weak').textContent=w;$('starred').textContent=s;$('left').textContent=DATA.length-k;$('bar').style.width=(k/DATA.length*100)+'%'}
function hay(x){return [x.word,x.reading,x.meaning,x.story,...x.kanjiNotes.map(n=>n.char+' '+n.line+' '+n.parts.map(p=>p.label).join(' '))].join(' ').toLowerCase()}
function filtered(){let a=DATA.filter(x=>(state.pos==='전체'||x.pos===state.pos)&&(!state.star||progress.star[x.no])&&(!state.weak||isWeak(x)));let q=state.q.trim().toLowerCase();if(q)a=a.filter(x=>hay(x).includes(q));if(state.sort==='random')a=[...a].sort(()=>Math.random()-.5);if(state.sort==='hard')a=[...a].sort((a,b)=>miss(b.no)-miss(a.no)||(progress.known[a.no]?1:0)-(progress.known[b.no]?1:0)||a.no-b.no);if(state.sort==='smart')a=[...a].sort((a,b)=>score(a)-score(b));return a}
function renderTabs(){$('tabs').innerHTML=posList.map(p=>`<button class="tab ${state.pos===p?'on':''}" data-pos="${p}">${p}</button>`).join('');document.querySelectorAll('[data-pos]').forEach(b=>b.onclick=()=>{state.pos=b.dataset.pos;state.index=0;render()})}
function memory(x){if(!x.kanjiNotes.length)return '<details class="memory"><summary>연상법</summary><div class="focus">소리와 뜻을 바로 묶어 외우세요.</div></details>';return `<details class="memory"><summary>조각 자세히 보기</summary>${x.kanjiNotes.map(n=>`<div class="kanji"><div class="kanji-head"><div class="kanji-char">${n.char}</div><div class="chips">${n.parts.length?n.parts.map(p=>`<span class="chip">${p.glyph} · ${p.label}</span>`).join(''):'<span class="chip">모양 통째</span>'}</div></div><p>${n.line}</p></div>`).join('')}<div class="mini">암기용 이미지입니다. 어원이 아니라 기억 장치로 쓰세요.</div></details>`}
function card(x){let known=progress.known[x.no],star=progress.star[x.no],m=miss(x.no);if(state.lastSeenNo!==x.no){progress.seen[x.no]=(progress.seen[x.no]||0)+1;state.lastSeenNo=x.no;save()}return `<section class="card ${state.hidden?'hidden':''}"><div class="meta"><span>#${String(x.no).padStart(3,'0')} · ${x.pos} · 오답 ${m}</span><span>${known?'외움':'학습중'} ${star?'<span class="badge">★</span>':''}</span></div><div class="jp">${x.word}</div><div class="read">${x.reading}</div><div class="mean">${x.meaning}</div><div class="focus">${x.story}</div>${memory(x)}<div class="actions"><button class="again" onclick="mark(${x.no},'miss')">모름</button><button class="iffy" onclick="mark(${x.no},'iffy')">헷갈림</button><button onclick="toggleStar(${x.no})">${star?'북마크 해제':'북마크'}</button><button class="known" onclick="mark(${x.no},'known')">외움</button></div></section>`}
function renderCards(){let a=filtered();if(!a.length){$('cards').innerHTML='<div class="empty">조건에 맞는 단어가 없어요.</div>';return}state.index=Math.max(0,Math.min(state.index,a.length-1));$('cards').innerHTML=card(a[state.index])+`<div class="empty">${state.index+1} / ${a.length}</div>`}
function renderQuiz(){let a=filtered();if(a.length<4){$('quiz').innerHTML='<div class="empty">퀴즈는 단어가 4개 이상 필요해요.</div>';return}let pool=a.filter(isWeak);if(pool.length<4)pool=a;let target=pool[Math.floor(Math.random()*pool.length)],choices=[target.meaning];while(choices.length<4){let m=DATA[Math.floor(Math.random()*DATA.length)].meaning;if(!choices.includes(m))choices.push(m)}choices.sort(()=>Math.random()-.5);$('quiz').innerHTML=`<section class="card"><div class="meta"><span>#${target.no} · ${target.pos} · 오답 ${miss(target.no)}</span><span>뜻 고르기</span></div><div class="jp">${target.word}</div><div class="read">${target.reading}</div><div class="focus">${target.story}</div>${choices.map(c=>`<button class="choice" onclick="answer(this,'${encodeURIComponent(c)}','${encodeURIComponent(target.meaning)}',${target.no})">${c}</button>`).join('')}</section>`}
function buildSession(){let base=DATA.filter(x=>!progress.known[x.no]||miss(x.no)>0||progress.star[x.no]);if(base.length<20)base=DATA;state.session=[...base].sort((a,b)=>score(a)-score(b)).slice(0,20).map(x=>x.no)}
function renderCram(){if(!state.session.length)buildSession();let rows=state.session.map(no=>{let x=byNo(no);return `<div class="row"><span class="k">${x.word}</span><span><b>${x.reading}</b><br><small>${x.meaning}</small></span><button onclick="state.index=filtered().findIndex(v=>v.no===${no});setMode('cards')">보기</button></div>`}).join('');$('cram').innerHTML=`<section class="card"><div class="meta"><span>지금 볼 20개</span><button onclick="buildSession();renderCram()">새로 뽑기</button></div><div class="mini">약점, 북마크, 미암기 단어를 우선으로 자동 선별합니다.</div><div class="sessionList">${rows}</div></section>`}
function setMode(mode){state.mode=mode;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));$(mode==='cards'?'cards':mode==='quiz'?'quiz':'cram').classList.add('on');$('modeCards').classList.toggle('primary',mode==='cards');$('modeQuiz').classList.toggle('primary',mode==='quiz');$('modeCram').classList.toggle('primary',mode==='cram');render()}
function render(){renderTabs();$('onlyStar').classList.toggle('primary',state.star);$('onlyWeak').classList.toggle('primary',state.weak);$('hideMean').classList.toggle('primary',state.hidden);if(state.mode==='cards')renderCards();if(state.mode==='quiz')renderQuiz();if(state.mode==='cram')renderCram();stats()}
function mark(no,kind){if(kind==='known'){progress.known[no]=1;if(progress.miss[no])progress.miss[no]=Math.max(0,progress.miss[no]-1)}if(kind==='miss'){delete progress.known[no];progress.miss[no]=(progress.miss[no]||0)+1}if(kind==='iffy'){delete progress.known[no];progress.star[no]=1;progress.miss[no]=(progress.miss[no]||0)+1}save();state.index++;renderCards()}
function toggleStar(no){progress.star[no]?delete progress.star[no]:progress.star[no]=1;save();renderCards()}
function answer(btn,c,t,no){let ok=decodeURIComponent(c)===decodeURIComponent(t);btn.classList.add(ok?'good':'bad');if(ok){progress.known[no]=1;if(progress.miss[no])progress.miss[no]=Math.max(0,progress.miss[no]-1)}else{delete progress.known[no];progress.miss[no]=(progress.miss[no]||0)+1}save();setTimeout(renderQuiz,850)}
$('q').oninput=e=>{state.q=e.target.value;state.index=0;render()};$('sort').onchange=e=>{state.sort=e.target.value;state.index=0;render()};$('modeCards').onclick=()=>setMode('cards');$('modeQuiz').onclick=()=>setMode('quiz');$('modeCram').onclick=()=>setMode('cram');$('onlyStar').onclick=()=>{state.star=!state.star;state.index=0;render()};$('onlyWeak').onclick=()=>{state.weak=!state.weak;state.index=0;render()};$('hideMean').onclick=()=>{state.hidden=!state.hidden;render()};$('prev').onclick=()=>{state.index--;renderCards()};$('next').onclick=()=>{state.index++;renderCards()};$('shuffle').onclick=()=>{state.sort='random';$('sort').value='random';state.index=0;render()};render();
</script>
